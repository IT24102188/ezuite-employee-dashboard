<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>eZuite – Employee</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-table-cells"></i>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item" data-label="Dashboard">
        <i class="fa-solid fa-house"></i>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item active" data-label="Employees">
        <i class="fa-solid fa-users"></i>
        <span>Employees</span>
      </a>
      <a href="#" class="nav-item" data-label="Attendance">
        <i class="fa-solid fa-calendar-check"></i>
        <span>Attendance</span>
      </a>
      <a href="#" class="nav-item" data-label="Payroll">
        <i class="fa-solid fa-file-invoice-dollar"></i>
        <span>Payroll</span>
      </a>
      <a href="#" class="nav-item" data-label="Time">
        <i class="fa-solid fa-clock"></i>
        <span>Time</span>
      </a>
      <a href="#" class="nav-item" data-label="Reports">
        <i class="fa-solid fa-chart-bar"></i>
        <span>Reports</span>
      </a>
      <a href="#" class="nav-item" data-label="Settings">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main-wrapper">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand">
          <i class="fa-solid fa-table-cells-large"></i>
          <span>eZuite</span>
        </div>
        <div class="breadcrumb">
          <i class="fa-solid fa-cubes"></i>
          <span>eCore</span>
          <span class="bc-sep">&gt;</span>
          <strong>Employee</strong>
          <i class="fa-regular fa-star bc-star"></i>
        </div>
      </div>
      <div class="topbar-right">
        <span class="company-name">Enhanzer</span>
        <div class="avatar">A</div>
        <i class="fa-solid fa-bell topbar-icon"></i>
        <i class="fa-solid fa-star topbar-icon"></i>
        <i class="fa-solid fa-gear topbar-icon"></i>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="content">

      <!-- TOOLBAR -->
      <div class="toolbar">
        <div class="tabs">
          <button class="tab" data-tab="drafts">
            <i class="fa-regular fa-file"></i> Drafts
          </button>
          <button class="tab active" data-tab="active">
            <i class="fa-solid fa-check"></i> Active
            <span class="badge" id="activeCount">16</span>
          </button>
          <button class="tab" data-tab="inactive">
            <i class="fa-solid fa-ban"></i> Inactive
          </button>
          <button class="tab" data-tab="deleted">
            <i class="fa-solid fa-trash"></i> Deleted
          </button>
        </div>
        <div class="toolbar-right">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search..."/>
          </div>
          <div class="pagination">
            <button id="prevBtn" class="pg-btn"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="pageInfo">1 / 2</span>
            <button id="nextBtn" class="pg-btn"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Address</th>
              <th>Mobile</th>
              <th>Email</th>
              <th>Department</th>
              <th>Designation</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <footer class="footer">&copy; 2026 eZuite. All rights reserved.</footer>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
