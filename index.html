<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eZuite Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="top-navbar">
        <div class="nav-left">
            <i class="fa-solid fa-house home-icon"></i>
            <span class="brand-name">eZuite</span>
            <div class="breadcrumbs">
                <i class="fa-solid fa-cubes"></i> eCore &gt; <span class="active-crumb">Employee</span>
            </div>
        </div>
        <div class="nav-right">
            <span class="user-company">Enhanzer</span>
            <div class="user-avatar">A</div>
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-gear"></i>
        </div>
    </header>

    <div class="app-body">
        <aside class="sidebar">
            <div class="sidebar-item"><i class="fa-solid fa-gauge"></i><span>Dashboard</span></div>
            <div class="sidebar-item active-nav"><i class="fa-solid fa-users"></i><span>Employees</span></div>
            <div class="sidebar-item"><i class="fa-solid fa-calendar-days"></i><span>Attendance</span></div>
            <div class="sidebar-item"><i class="fa-solid fa-file-invoice-dollar"></i><span>Payroll</span></div>
            <div class="sidebar-item"><i class="fa-solid fa-clock"></i><span>Time Tracking</span></div>
            <div class="sidebar-footer">
                <i class="fa-solid fa-angle-left toggle-sidebar"></i>
            </div>
        </aside>

        <main class="main-content">
            
            <div class="content-header">
                <div class="tabs">
                    <button class="tab-btn" data-tab="drafts">Drafts</button>
                    <button class="tab-btn active-tab" data-tab="active">Active <span class="badge">15</span></button>
                    <button class="tab-btn" data-tab="inactive">Inactive</button>
                    <button class="tab-btn" data-tab="deleted">Deleted</button>
                </div>
                <div class="table-actions">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search...">
                    </div>
                    <div class="pagination-controls">
                        <i class="fa-solid fa-angle-left"></i>
                        <span class="page-num active-page">1</span>
                        <span class="page-num">2</span>
                        <i class="fa-solid fa-angle-right"></i>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table id="employee-table">
                    <thead>
                        <tr>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Address</th>
                            <th>Mobile</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th>Updated</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>

            <footer class="content-footer">
                <p>&copy; 2026 eZuite. All rights reserved.</p>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
